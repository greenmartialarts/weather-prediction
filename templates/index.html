<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        h1 {
            color: white;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .quick-hours {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .hour-btn {
            padding: 8px 16px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .hour-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .hour-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .btn-primary {
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            align-self: flex-end;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            padding: 10px 24px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            color: #667eea;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
            animation: fadeInUp 0.6s ease;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: #718096;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: -2px;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .chart-container {
            margin-bottom: 30px;
            text-align: center;
        }

        .chart-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .data-table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f7fafc;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f7fafc;
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .success {
            background: #efe;
            border: 2px solid #cfc;
            color: #3c3;
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .success.active {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .input-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Forecast AI</h1>
            <p class="subtitle">Advanced machine learning weather predictions powered by XGBoost</p>
        </header>

        <div class="main-card">
            <div class="input-section">
                <div class="input-group">
                    <label>City Name</label>
                    <input type="text" id="cityInput" placeholder="San Francisco" value="San Francisco">
                </div>
                <div class="input-group">
                    <label>Forecast Hours</label>
                    <input type="number" id="hoursInput" min="1" max="720" value="24">
                    <div class="quick-hours">
                        <button class="hour-btn active" onclick="setHours(24)">24h</button>
                        <button class="hour-btn" onclick="setHours(48)">48h</button>
                        <button class="hour-btn" onclick="setHours(72)">72h</button>
                        <button class="hour-btn" onclick="setHours(168)">7d</button>
                    </div>
                </div>
                <button class="btn-primary" onclick="generateForecast()" id="forecastBtn">
                    Generate Forecast
                </button>
            </div>

            <div class="actions">
                <button class="btn-secondary" onclick="retrainModel()" id="retrainBtn">
                    🔄 Retrain Model
                </button>
                <button class="btn-secondary" onclick="exportCSV()" id="exportBtn" disabled>
                    💾 Export CSV
                </button>
            </div>

            <div class="error" id="errorMessage"></div>
            <div class="success" id="successMessage"></div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Generating forecast...</div>
            </div>

            <div class="results" id="results">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('chart')">📊 Chart</button>
                    <button class="tab" onclick="switchTab('stats')">📈 Statistics</button>
                    <button class="tab" onclick="switchTab('data')">📋 Data Table</button>
                </div>

                <div class="tab-content active" id="chartTab">
                    <div class="chart-container">
                        <img id="chartImage" src="" alt="Forecast Chart">
                    </div>
                </div>

                <div class="tab-content" id="statsTab">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Mean Temperature</div>
                            <div class="stat-value" id="statMean">--</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Min Temperature</div>
                            <div class="stat-value" id="statMin">--</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Max Temperature</div>
                            <div class="stat-value" id="statMax">--</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Temperature Range</div>
                            <div class="stat-value" id="statRange">--</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Std Deviation</div>
                            <div class="stat-value" id="statStd">--</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Median Temperature</div>
                            <div class="stat-value" id="statMedian">--</div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="dataTab">
                    <div class="data-table-container">
                        <table id="dataTable">
                            <thead>
                                <tr>
                                    <th>Date/Time</th>
                                    <th>Temperature (°C)</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;

        function setHours(hours) {
            document.getElementById('hoursInput').value = hours;
            document.querySelectorAll('.hour-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
            setTimeout(() => errorEl.classList.remove('active'), 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('active');
            setTimeout(() => successEl.classList.remove('active'), 3000);
        }

        async function generateForecast() {
            const city = document.getElementById('cityInput').value.trim();
            const hours = parseInt(document.getElementById('hoursInput').value);

            if (!city) {
                showError('Please enter a city name');
                return;
            }

            if (hours <= 0 || hours > 720) {
                showError('Hours must be between 1 and 720');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('forecastBtn').disabled = true;
            document.getElementById('retrainBtn').disabled = true;

            try {
                const response = await fetch('/api/forecast', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ city, hours })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate forecast');
                }

                currentData = data;
                displayResults(data);

                document.getElementById('exportBtn').disabled = false;
                document.getElementById('results').classList.add('active');
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('forecastBtn').disabled = false;
                document.getElementById('retrainBtn').disabled = false;
            }
        }

        function displayResults(data) {
            // Display chart
            document.getElementById('chartImage').src = data.chart;

            // Display statistics
            document.getElementById('statMean').textContent = data.stats.mean.toFixed(1) + ' °C';
            document.getElementById('statMin').textContent = data.stats.min.toFixed(1) + ' °C';
            document.getElementById('statMax').textContent = data.stats.max.toFixed(1) + ' °C';
            document.getElementById('statRange').textContent = data.stats.range.toFixed(1) + ' °C';
            document.getElementById('statStd').textContent = data.stats.std.toFixed(2) + ' °C';
            document.getElementById('statMedian').textContent = data.stats.median.toFixed(1) + ' °C';

            // Display data table
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.timestamps.forEach((timestamp, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = timestamp;
                row.insertCell(1).textContent = data.temperatures[index].toFixed(2) + ' °C';
            });
        }

        async function retrainModel() {
            const city = document.getElementById('cityInput').value.trim();

            if (!city) {
                showError('Please enter a city name');
                return;
            }

            if (!confirm(`This will download fresh data and retrain the model for ${city}. This may take several minutes. Continue?`)) {
                return;
            }

            document.getElementById('retrainBtn').disabled = true;
            document.getElementById('retrainBtn').textContent = '⏳ Retraining...';

            try {
                const response = await fetch('/api/retrain', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ city })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to retrain model');
                }

                showSuccess(data.message);
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('retrainBtn').disabled = false;
                document.getElementById('retrainBtn').textContent = '🔄 Retrain Model';
            }
        }

        async function exportCSV() {
            if (!currentData) {
                showError('No data to export');
                return;
            }

            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        timestamps: currentData.timestamps,
                        temperatures: currentData.temperatures
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to export CSV');
                }

                // Download CSV
                const blob = new Blob([data.csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${currentData.city}_forecast_${new Date().toISOString().slice(0,10)}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showSuccess('Forecast exported successfully');
            } catch (error) {
                showError(error.message);
            }
        }

        // Enter key support
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateForecast();
            }
        });

        document.getElementById('hoursInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateForecast();
            }
        });
    </script>
</body>
</html>
